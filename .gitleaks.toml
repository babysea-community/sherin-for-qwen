title = "App gitleaks config"

[allowlist]
description = "Allow app documentation and CI placeholder examples."
regexTarget = "match"
regexes = [
  '''DASHSCOPE_API_KEY=ci''',
  '''DASHSCOPE_API_KEY=<alibaba_cloud_api_key>''',
  '''OWNER_EMAIL=owner@example.com''',
  '''SUPABASE_SECRET_KEY=ci''',
  '''NEXT_PUBLIC_SUPABASE_PUBLIC_KEY=ci''',
]
